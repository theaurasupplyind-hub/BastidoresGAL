<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 0; 
            font-size: 16px; /* Aumentado para legibilidad */
            color: #000; 
            line-height: 1.1; 
        }

        .invoice-container-mini {
            width: 100%;
            height: 100%;
            padding: 5px 35px; /* Ajuste para evitar desbordamiento en media hoja */
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        /* HEADER CLASICO */
        .header {
            border: 2px solid #000;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .company-name {
            font-size: 28px;
            font-weight: bold;
            text-decoration: underline;
        }

        .company-details { font-size: 13px; margin-top: 3px; }

        .meta-box { 
            text-align: right; 
            border-left: 2px solid #000; 
            padding-left: 15px; 
        }

        .meta-title { font-size: 22px; font-weight: bold; margin-bottom: 2px; }

        /* BLOQUE CLIENTE */
        .client-section {
            margin-bottom: 15px;
            border: 2px solid #000;
            padding: 8px;
        }

        .client-row { display: flex; margin-bottom: 5px; font-size: 18px; }
        .label { font-weight: bold; width: 110px; text-transform: uppercase; }
        .value { flex: 1; border-bottom: 1px solid #000; font-weight: bold; }

        /* TABLA DE ITEMS */
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        .items-table th {
            border: 2px solid #000;
            padding: 6px;
            text-align: center;
            text-transform: uppercase;
            font-size: 16px;
        }

        .items-table td {
            border: 1px solid #000;
            padding: 5px;
            font-size: 18px;
            font-weight: bold;
        }

        .col-cant { width: 60px; text-align: center; }
        .col-pu, .col-tot { width: 110px; text-align: right; }

        /* TOTALES Y FOOTER */
        .footer-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto; /* Empuja el footer al final de la media hoja */
            padding-bottom: 15px;
        }

        .shipping-box {
            border: 2px solid #000;
            padding: 8px 15px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .total-box {
            border: 3px solid #000;
            padding: 10px 20px;
            text-align: right;
            min-width: 220px;
            background-color: #f0f0f0; /* Diferenciación visual */
        }

        .total-line { 
            font-size: 26px; 
            font-weight: 900; 
        }

        .saldo-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .saldo-value.pagado {
            font-size: 26px;
            font-weight: 900;
            color: #16a34a;
            line-height: 1;
            white-space: nowrap;
        }
        .saldo-value.debe {
            font-size: 26px !important;
            font-weight: 900 !important;
            color: #dc2626 !important;
            line-height: 1;
            white-space: nowrap;
        }
        .total-small {
            font-size: 15px;
            color: #555;
            font-weight: 600;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="invoice-container-mini">
    <!-- HEADER -->
    <div class="header">
        <div>
            <div class="company-name">BASTIDORES GAL</div>
            <div class="company-details">
                Bermudez 331 - C.A.B.A<br>
                Tel: 3535-4271 / 11 3102 7212
            </div>
        </div>
        <div class="meta-box">
            <div class="meta-title">PRESUPUESTO</div>
            <div>N°: <span id="invoiceNumBold"></span></div>
            <div>FECHA: <span id="invoiceDateDay"></span>/<span id="invoiceDateMonth"></span>/<span id="invoiceDateYear"></span></div>
        </div>
    </div>

    <!-- CLIENTE -->
    <div class="client-section">
        <div class="client-row">
            <span class="label">Señor(es):</span>
            <span class="value" id="customerName"></span>
        </div>
        <div class="client-row">
            <span class="label">Domicilio:</span>
            <span class="value" id="customerAddress"></span>
        </div>
        <div class="client-row">
            <span class="label">Teléfono:</span>
            <span class="value" id="customerPhone"></span>
        </div>
    </div>

    <!-- TABLA -->
    <table class="items-table">
        <thead>
            <tr>
                <th class="col-cant">Cant</th>
                <th>Descripción / Concepto</th>
                <th class="col-pu">P. Unit</th>
                <th class="col-tot">Total</th>
            </tr>
        </thead>
        <tbody id="invoiceItems">
            <!-- Rellenado por logic.py -->
        </tbody>
    </table>

    <!-- TOTALES -->
    <div class="footer-area">
        <!-- Cuadro de Envío Independiente -->
        <div class="shipping-box">
            ENVÍO: <span id="deliveryValue"></span>
        </div>

        <!-- Cuadro de Total Independiente -->
        <div class="total-box">
            <span class="total-line">TOTAL: $<span id="invoiceTotal"></span></span>
        </div>
    </div>
</div>

</body>
</html>
