name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bastidores GAL v__VERSION__'
          releaseBody: 'Ver cambios en el commit.'
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --target ${{ matrix.target }}

      - name: Upload latest.json to Render
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Start-Sleep -Seconds 10
          $version = "${{ github.ref_name }}" -replace "^v", ""
          gh release download ${{ github.ref_name }} --pattern "*_$($version)_*.sig" --skip-existing
          $sigFile = Get-ChildItem "*_$($version)_*.sig" | Select-Object -First 1
          if (-not $sigFile) { throw "No .sig file found in release assets" }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Bastidores.GAL_${version}_x64-setup.exe"
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $json = @{
            version = "v$version"
            notes = "Actualizaci`u{00f3}n v$version"
            pub_date = $now
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $url
              }
            }
          } | ConvertTo-Json -Compress -Depth 10
          curl.exe -X POST "https://api-bastidores.onrender.com/updater/manifest" `
            --connect-timeout 10 --max-time 120 --retry 3 --retry-delay 15 `
            -H "Authorization: Bearer ${{ secrets.UPDATER_TOKEN }}" `
            -H "Content-Type: application/json" `
            --data-binary "$json" -f
